version: '3.8'

services:
  # FastAPI 后端服务
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: labor-risk-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY}
      - API_BASE=${API_BASE}
      - MODEL_NAME=${MODEL_NAME}
    volumes:
      - ./logs:/app/logs
    networks:
      - labor-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Nginx 反向代理 + 静态文件服务
  nginx:
    image: nginx:1.25-alpine
    container_name: labor-risk-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./static:/usr/share/nginx/html/static:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./logs:/var/log/nginx
    depends_on:
      api:
        condition: service_healthy
    networks:
      - labor-network

networks:
  labor-network:
    driver: bridge

volumes:
  logs:
